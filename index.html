<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Ammo - Leitor Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #003366; text-align: center; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #003366; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #999; cursor: not-allowed; }
        .btn-acao { background: #28a745; margin-top: 15px; padding: 15px; }
        .btn-captura { background: #ff9900; color: #000; font-size: 18px; padding: 18px; }
        .hidden { display: none !important; }
        
        #video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; margin-top: 15px; background: #000; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; display: block; object-fit: cover; }
        
        /* Mira otimizada para capturar apenas uma linha de texto */
        .mira { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60px; border: 3px solid rgba(255, 204, 0, 0.9); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6); pointer-events: none; border-radius: 5px; }
        
        #status { text-align: center; font-weight: bold; margin-top: 15px; color: #003366; min-height: 24px; font-size: 14px; }
        #area-edicao { background: #e6f6ea; padding: 15px; border-radius: 8px; border: 1px solid #28a745; margin-top: 15px; }
        .user-label { font-size: 0.8em; color: #666; text-align: right; margin-bottom: 10px; }
        
        /* Canvas de debug para vermos como a IA está enxergando a imagem */
        #preview-ia { width: 100%; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2>Sistema AMMO</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button id="btn-login" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
</div>

<div class="card hidden" id="mainApp">
    <div class="user-label">Logado como: <b id="displayUser"></b></div>
    
    <label>Operação:</label>
    <select id="tipo">
        <option value="CONFERENCIA">CONFERÊNCIA (Entrada)</option>
        <option value="VENDA">BAIXA DE VENDA</option>
    </select>

    <label>Grife:</label>
    <select id="marca" onchange="document.getElementById('outraMarca').classList.toggle('hidden', this.value !== 'OUTRA')">
        <option value="AMMO">AMMO</option>
        <option value="RAY-BAN">RAY-BAN</option>
        <option value="OAKLEY">OAKLEY</option>
        <option value="OUTRA">-- OUTRA MARCA --</option>
    </select>
    <input type="text" id="outraMarca" class="hidden" placeholder="Nome da nova grife">

    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
        <div class="mira"></div>
    </div>
    
    <button id="btn-capturar" class="btn-captura" onclick="capturarEExtrairTexto()">📸 LER ETIQUETA</button>
    <div id="status">Aproxime até a referência preencher o quadro amarelo.</div>

    <div id="area-edicao" class="hidden">
        <label style="color:#28a745; font-weight:bold; font-size: 14px;">O que a IA enxergou (Filtro P&B):</label>
        <canvas id="preview-ia"></canvas>
        
        <label style="color:#003366; font-weight:bold; display:block; margin-top:10px;">Referência para salvar:</label>
        <input type="text" id="texto-extraido" style="text-transform: uppercase; font-size: 22px; text-align: center; font-weight: bold; letter-spacing: 1px;">
        
        <button id="btn-salvar" class="btn-acao" onclick="enviarLançamento()">✔ CONFIRMAR E SALVAR</button>
        <button onclick="descartarLeitura()" style="background: #dc3545; margin-top: 10px; padding: 12px;">✖ REFAZER FOTO</button>
    </div>

    <canvas id="canvas-oculto" class="hidden"></canvas>
</div>

<script>
    // =========================================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxk9G3eEoeS28cJbeL3ZWZpc9-Izg3slWp62nZDl2X_DlM31dNaksI9B9nl70uNS4N-/exec"; 
    // =========================================================

    let userAtivo = "";
    const video = document.getElementById('camera');
    const audioBeep = new Audio('https://www.soundjay.com/button/beep-07.wav');

    async function enviarParaAPI(payload) {
        try {
            const resposta = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify(payload)
            });
            return await resposta.json();
        } catch (erro) { return null; }
    }

    async function fazerLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const btn = document.getElementById('btn-login');
        
        btn.innerText = "Aguarde..."; btn.disabled = true;
        const res = await enviarParaAPI({ acao: "login", usuario: u, senha: p });
        btn.innerText = "ENTRAR NO SISTEMA"; btn.disabled = false;

        if (res && res.sucesso) {
            userAtivo = u;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUser').innerText = u;
            iniciarCamera();
        } else { alert("Acesso Negado!"); }
    }

    function iniciarCamera() {
        // Pede a câmera traseira com a maior resolução possível para ler letras pequenas
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { document.getElementById('status').innerText = "Erro na câmera."; });
    }

    async function capturarEExtrairTexto() {
        const btnCap = document.getElementById('btn-capturar');
        const status = document.getElementById('status');
        
        // 1. Calcula o recorte exato do retângulo amarelo (mira)
        const videoW = video.videoWidth;
        const videoH = video.videoHeight;
        
        // A mira tem 80% da largura da tela e altura fixa
        const cropW = videoW * 0.8;
        const cropH = videoH * 0.2; // Pega uma faixa central fina
        const startX = (videoW - cropW) / 2;
        const startY = (videoH - cropH) / 2;

        // 2. Prepara o canvas oculto e o preview
        const canvasOculto = document.getElementById('canvas-oculto');
        const canvasPreview = document.getElementById('preview-ia');
        
        canvasOculto.width = cropW; canvasOculto.height = cropH;
        canvasPreview.width = cropW; canvasPreview.height = cropH;
        
        const ctxOculto = canvasOculto.getContext('2d');
        const ctxPreview = canvasPreview.getContext('2d');

        // 3. Aplica o filtro de altíssimo contraste (Preto e Branco)
        ctxOculto.filter = 'grayscale(100%) contrast(250%) brightness(120%)';
        
        // 4. Desenha apenas o pedaço da mira no canvas
        ctxOculto.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
        
        // Copia para o preview para o usuário ver o que a IA vai ler
        ctxPreview.drawImage(canvasOculto, 0, 0);

        audioBeep.play();
        btnCap.disabled = true;
        btnCap.innerText = "Lendo Letras... Aguarde";
        status.innerText = "Extraindo referência...";

        try {
            // 5. Envia a imagem tratada para o Tesseract com bloqueio de caracteres
            const result = await Tesseract.recognize(canvasOculto, 'eng', {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 -/', // Só aceita isso
                tessedit_pageseg_mode: '7' // Modo 7: Trata a imagem como uma única linha de texto
            });
            
            let textoLido = result.data.text.trim();
            textoLido = textoLido.replace(/[^A-Z0-9-]/g, ''); // Limpeza final pesada

            if (textoLido.length >= 3) {
                document.getElementById('video-container').classList.add('hidden');
                btnCap.classList.add('hidden');
                document.getElementById('area-edicao').classList.remove('hidden');
                
                document.getElementById('texto-extraido').value = textoLido;
                status.innerText = "Confira a leitura e ajuste se necessário.";
            } else {
                status.innerText = "Leitura fraca. Limpe a lente ou chegue mais perto.";
                btnCap.disabled = false;
                btnCap.innerText = "📸 TENTAR DE NOVO";
            }
        } catch (erro) {
            status.innerText = "Falha no processador de imagem.";
            btnCap.disabled = false;
            btnCap.innerText = "📸 TENTAR DE NOVO";
        }
    }

    function descartarLeitura() {
        document.getElementById('area-edicao').classList.add('hidden');
        document.getElementById('video-container').classList.remove('hidden');
        
        const btnCap = document.getElementById('btn-capturar');
        btnCap.classList.remove('hidden');
        btnCap.disabled = false;
        btnCap.innerText = "📸 LER ETIQUETA";
        document.getElementById('status').innerText = "Aproxime até a referência preencher o quadro amarelo.";
    }

    async function enviarLançamento() {
        const textoFinal = document.getElementById('texto-extraido').value.trim();
        if (!textoFinal) { alert("A referência não pode estar vazia!"); return; }

        const m = document.getElementById('marca').value;
        const marcaFinal = (m === "OUTRA") ? document.getElementById('outraMarca').value : m;
        if(!marcaFinal) { alert("Informe a marca!"); return; }

        const btnSalvar = document.getElementById('btn-salvar');
        btnSalvar.disabled = true;
        btnSalvar.innerText = "Salvando...";

        const dadosLancamento = { usuario: userAtivo, marca: marcaFinal, referencia: textoFinal, tipo: document.getElementById('tipo').value };

        const res = await enviarParaAPI({ acao: "salvar", dados: dadosLancamento });

        if (res && res.sucesso) {
            alert("Referência gravada no estoque!");
            descartarLeitura(); 
            btnSalvar.disabled = false;
            btnSalvar.innerText = "✔ CONFIRMAR E SALVAR";
        } else {
            alert("Erro de conexão com a planilha.");
            btnSalvar.disabled = false;
            btnSalvar.innerText = "✔ TENTAR SALVAR NOVAMENTE";
        }
    }
</script>
</body>
</html>
