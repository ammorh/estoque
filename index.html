<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Ammo - Leitor de Texto</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #003366; text-align: center; margin-top: 0; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #003366; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #999; cursor: not-allowed; }
        .btn-acao { background: #28a745; margin-top: 15px; }
        .btn-captura { background: #ff9900; color: #000; font-size: 18px; padding: 15px; }
        .hidden { display: none !important; }
        #video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; margin-top: 15px; border: 2px solid #ccc; background: #000; }
        video { width: 100%; display: block; }
        /* Mira central para ajudar o estocista a focar na etiqueta */
        .mira { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 50px; border: 2px solid rgba(255, 255, 0, 0.7); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5); pointer-events: none; }
        #status { text-align: center; font-weight: bold; margin-top: 10px; color: #003366; min-height: 24px; }
        #area-edicao { background: #e6f6ea; padding: 15px; border-radius: 8px; border: 1px solid #28a745; margin-top: 15px; }
        .user-label { font-size: 0.8em; color: #666; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card" id="loginArea">
    <h2>Sistema AMMO</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button id="btn-login" onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
</div>

<div class="card hidden" id="mainApp">
    <div class="user-label">Logado como: <b id="displayUser"></b></div>
    
    <label>Operação:</label>
    <select id="tipo">
        <option value="CONFERENCIA">CONFERÊNCIA (Entrada)</option>
        <option value="VENDA">BAIXA DE VENDA</option>
    </select>

    <label>Grife:</label>
    <select id="marca" onchange="document.getElementById('outraMarca').classList.toggle('hidden', this.value !== 'OUTRA')">
        <option value="AMMO">AMMO</option>
        <option value="RAY-BAN">RAY-BAN</option>
        <option value="OAKLEY">OAKLEY</option>
        <option value="OUTRA">-- OUTRA MARCA (DIGITAR) --</option>
    </select>
    <input type="text" id="outraMarca" class="hidden" placeholder="Nome da nova grife">

    <div id="video-container">
        <video id="camera" autoplay playsinline></video>
        <div class="mira"></div>
    </div>
    
    <button id="btn-capturar" class="btn-captura" onclick="capturarEExtrairTexto()">📸 LER ETIQUETA</button>
    <div id="status">Aponte a etiqueta dentro do quadro amarelo.</div>

    <div id="area-edicao" class="hidden">
        <label style="color:#28a745; font-weight:bold;">Confirme a Referência:</label>
        <input type="text" id="texto-extraido" style="text-transform: uppercase; font-size: 18px; text-align: center; font-weight: bold;">
        <button id="btn-salvar" class="btn-acao" onclick="enviarLançamento()">✔ CONFIRMAR E SALVAR</button>
        <button onclick="descartarLeitura()" style="background: #dc3545; margin-top: 5px;">✖ TENTAR NOVAMENTE</button>
    </div>

    <canvas id="canvas" class="hidden"></canvas>
</div>

<script>
    // =========================================================
    // COLE SEU LINK DO GOOGLE APPS SCRIPT AQUI ABAIXO:
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxk9G3eEoeS28cJbeL3ZWZpc9-Izg3slWp62nZDl2X_DlM31dNaksI9B9nl70uNS4N-/exec"; 
    // =========================================================

    let userAtivo = "";
    const video = document.getElementById('camera');
    const canvas = document.getElementById('canvas');
    const audioBeep = new Audio('https://www.soundjay.com/button/beep-07.wav');

    async function enviarParaAPI(payload) {
        try {
            const resposta = await fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify(payload)
            });
            return await resposta.json();
        } catch (erro) {
            console.error(erro);
            return null;
        }
    }

    async function fazerLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const btn = document.getElementById('btn-login');
        
        btn.innerText = "Aguarde...";
        btn.disabled = true;
        
        const res = await enviarParaAPI({ acao: "login", usuario: u, senha: p });
        
        btn.innerText = "ENTRAR NO SISTEMA";
        btn.disabled = false;

        if (res && res.sucesso) {
            userAtivo = u;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUser').innerText = u;
            iniciarCamera();
        } else {
            alert("Acesso Negado!");
        }
    }

    function iniciarCamera() {
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
        })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { 
            document.getElementById('status').innerHTML = "<span style='color:red'>Erro ao acessar a câmera.</span>"; 
        });
    }

    async function capturarEExtrairTexto() {
        const btnCap = document.getElementById('btn-capturar');
        const status = document.getElementById('status');
        
        // Configura o canvas para o tamanho do vídeo
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        
        // Tira a foto
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Toca o som de clique/captura
        audioBeep.play();

        btnCap.disabled = true;
        btnCap.innerText = "Processando Imagem... Aguarde";
        status.innerText = "A Inteligência Artificial está lendo o texto...";

        try {
            // Usa o Tesseract (IA) para ler a imagem
            // 'eng' (inglês) costuma ser melhor e mais rápido para códigos alfanuméricos puros
            const result = await Tesseract.recognize(canvas, 'eng');
            
            // Limpa o texto: tira quebras de linha e espaços duplos
            let textoLido = result.data.text.replace(/\n/g, ' ').trim();
            
            // Pega apenas letras, números e traços
            textoLido = textoLido.replace(/[^A-Za-z0-9- ]/g, '');

            if (textoLido.length > 1) {
                // Esconde a câmera e mostra a área de edição
                document.getElementById('video-container').classList.add('hidden');
                btnCap.classList.add('hidden');
                
                document.getElementById('area-edicao').classList.remove('hidden');
                document.getElementById('texto-extraido').value = textoLido.toUpperCase();
                status.innerText = "Edite o texto se necessário e confirme.";
            } else {
                status.innerText = "Não consegui ler. Tente aproximar mais.";
                btnCap.disabled = false;
                btnCap.innerText = "📸 TENTAR DE NOVO";
            }
        } catch (erro) {
            status.innerText = "Erro ao processar imagem.";
            btnCap.disabled = false;
            btnCap.innerText = "📸 LER ETIQUETA";
        }
    }

    function descartarLeitura() {
        document.getElementById('area-edicao').classList.add('hidden');
        document.getElementById('video-container').classList.remove('hidden');
        
        const btnCap = document.getElementById('btn-capturar');
        btnCap.classList.remove('hidden');
        btnCap.disabled = false;
        btnCap.innerText = "📸 LER ETIQUETA";
        document.getElementById('status').innerText = "Aponte a etiqueta dentro do quadro amarelo.";
    }

    async function enviarLançamento() {
        const textoFinal = document.getElementById('texto-extraido').value;
        if (!textoFinal) { alert("A referência não pode estar vazia!"); return; }

        const m = document.getElementById('marca').value;
        const marcaFinal = (m === "OUTRA") ? document.getElementById('outraMarca').value : m;
        if(!marcaFinal) { alert("Informe a marca!"); return; }

        const btnSalvar = document.getElementById('btn-salvar');
        btnSalvar.disabled = true;
        btnSalvar.innerText = "Salvando...";

        const dadosLancamento = {
            usuario: userAtivo,
            marca: marcaFinal,
            referencia: textoFinal,
            tipo: document.getElementById('tipo').value
        };

        const res = await enviarParaAPI({ acao: "salvar", dados: dadosLancamento });

        if (res && res.sucesso) {
            alert("Etiqueta lançada com sucesso!");
            descartarLeitura(); // Volta para a câmera automaticamente
            btnSalvar.disabled = false;
            btnSalvar.innerText = "✔ CONFIRMAR E SALVAR";
        } else {
            alert("Erro ao salvar no banco. Verifique a internet.");
            btnSalvar.disabled = false;
            btnSalvar.innerText = "✔ TENTAR SALVAR NOVAMENTE";
        }
    }
</script>
</body>
</html>
